# ============================
# Snowflake → Elasticsearch Sync Service Configuration
# ============================

snowflake:
  # --- Snowflake account details ---
  account: "your_account_id"        # e.g., xy12345.us-east-1
  user: "your_username"
  password: "your_password"         # OR use private_key below
  private_key: null                 # path to private key file (optional)

  warehouse: "COMPUTE_WH"
  database: "MY_DATABASE"
  schema: "PUBLIC"
  role: "SYSADMIN"

  # --- Incremental sync settings ---
  table: "MY_TABLE"                 # table to sync
  timestamp_column: "UPDATED_AT"    # column used for incremental sync

  batch_size: 5000                  # rows per batch when fetching

# ============================

elasticsearch:
  # --- Elasticsearch connection ---
  host: "http://localhost:9200"     # or Elastic Cloud URL
  api_key: null                     # for Elastic Cloud
  username: "elastic"               # for local cluster
  password: "changeme"

  index: "snowflake_sync"           # target index name

# ============================

service:
  # --- Sync loop settings ---
  interval_seconds: 60              # how often to run the sync loop

  # --- State file ---
  state_file: "state/state.json"    # where last sync timestamp is stored

  # --- Logging ---
  log_level: "INFO"                 # DEBUG, INFO, WARNING, ERROR
